name: Sync all upstream branches

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-all-upstream-branches
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror QuantLaw branches
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/QuantLaw/gesetze-im-internet.git
          git fetch upstream "+refs/heads/*:refs/remotes/upstream/*" --prune
          git fetch origin "+refs/heads/*:refs/remotes/origin/*" --prune

          # Keep this workflow on master while merging upstream changes.
          git checkout master
          git merge --no-edit upstream/master
          git push origin master

          # Every other branch is an exact mirror of upstream.
          while IFS= read -r ref; do
            branch="${ref#refs/remotes/upstream/}"
            [[ "$branch" == "master" ]] && continue
            git push --force origin \
              "refs/remotes/upstream/${branch}:refs/heads/${branch}"
          done < <(git for-each-ref \
            --format="%(refname)" refs/remotes/upstream/)

          # Remove branches that no longer exist upstream.
          while IFS= read -r ref; do
            branch="${ref#refs/remotes/origin/}"
            [[ "$branch" == "master" || "$branch" == "HEAD" ]] && continue
            if ! git show-ref --verify --quiet \
              "refs/remotes/upstream/${branch}"; then
              git push origin --delete "$branch"
            fi
          done < <(git for-each-ref \
            --format="%(refname)" refs/remotes/origin/)
